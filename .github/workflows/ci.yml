name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # --no-package-lock ignore le lockfile généré sous Windows qui ne contient que les binaires rollup win32
        run: npm install --no-package-lock

      - name: Lint
        run: npm run lint

      - name: Tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build:prod
