name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # npm ci utilise le lockfile Windows-only (pas de binaires Linux rollup) — npm install résout les optionnels natifs à l'install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build:prod
